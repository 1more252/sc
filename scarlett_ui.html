<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scarlett AI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:       #06070F;
  --bg2:      #0C0D1C;
  --card:     #0F1122;
  --surface:  #151728;
  --accent:   #C264FE;
  --accent2:  #00D4FF;
  --accent3:  #FF2D55;
  --green:    #00F5A0;
  --fg:       #E8EAFF;
  --fg2:      #5A5E8A;
  --fg3:      #1E2040;
  --border:   rgba(194,100,254,0.15);
  --glow:     rgba(194,100,254,0.3);
  --glow2:    rgba(0,212,255,0.25);
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: var(--bg);
  font-family: 'Syne', sans-serif;
  color: var(--fg);
  height: 100vh;
  overflow: hidden;
  user-select: none;
}

/* ── WebGL Canvas ── */
#canvas {
  position: fixed;
  inset: 0;
  z-index: 0;
  pointer-events: none;
}

/* ── Grain overlay ── */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  z-index: 1;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
  pointer-events: none;
  opacity: 0.4;
}

/* ── Main layout ── */
#app {
  position: relative;
  z-index: 2;
  width: 420px;
  height: 100vh;
  display: flex;
  flex-direction: column;
  margin: 0 auto;
  padding: 0;
}

/* ── Header ── */
#header {
  padding: 20px 24px 16px;
  background: linear-gradient(180deg, rgba(12,13,28,0.95) 0%, rgba(12,13,28,0.0) 100%);
  flex-shrink: 0;
}

.title-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 20px;
}

.title-bar-left {
  display: flex;
  align-items: center;
  gap: 10px;
  cursor: move;
}

.logo-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--accent);
  box-shadow: 0 0 12px var(--accent);
  animation: pulse-dot 2s ease-in-out infinite;
}
@keyframes pulse-dot {
  0%,100% { opacity:1; transform:scale(1); }
  50% { opacity:0.5; transform:scale(0.7); }
}

.title-text {
  font-size: 11px;
  letter-spacing: 0.25em;
  color: var(--fg2);
  text-transform: uppercase;
  font-weight: 400;
}

.title-actions {
  display: flex;
  gap: 6px;
}
.tbtn {
  width: 28px; height: 28px;
  border: 1px solid var(--border);
  border-radius: 8px;
  background: rgba(255,255,255,0.03);
  color: var(--fg2);
  cursor: pointer;
  display: flex; align-items:center; justify-content:center;
  font-size: 13px;
  transition: all 0.2s;
  backdrop-filter: blur(8px);
}
.tbtn:hover { background: rgba(194,100,254,0.1); color: var(--accent); border-color: var(--accent); }
.tbtn.close:hover { background: rgba(255,45,85,0.15); color: var(--accent3); border-color: var(--accent3); }

/* ── Orb ── */
.scarlett-card {
  background: linear-gradient(135deg, rgba(15,17,34,0.9) 0%, rgba(21,23,40,0.9) 100%);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 20px;
  display: flex;
  align-items: center;
  gap: 16px;
  backdrop-filter: blur(20px);
  position: relative;
  overflow: hidden;
}

.scarlett-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--accent), var(--accent2), transparent);
  opacity: 0.6;
}

.orb-wrap {
  position: relative;
  flex-shrink: 0;
}

.orb {
  width: 56px; height: 56px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  display: flex; align-items:center; justify-content:center;
  font-size: 22px;
  font-weight: 800;
  color: white;
  position: relative;
  box-shadow: 0 0 30px rgba(194,100,254,0.4), 0 0 60px rgba(0,212,255,0.2);
  transition: box-shadow 0.3s;
}

.orb::after {
  content: '';
  position: absolute;
  inset: -4px;
  border-radius: 50%;
  border: 2px solid transparent;
  background: linear-gradient(135deg, var(--accent), var(--accent2)) border-box;
  -webkit-mask: linear-gradient(#fff 0 0) padding-box, linear-gradient(#fff 0 0);
  -webkit-mask-composite: xor;
  mask-composite: exclude;
  opacity: 0;
  animation: orb-ring 3s ease-in-out infinite;
}
@keyframes orb-ring {
  0%,100% { opacity:0; transform:scale(1); }
  50% { opacity:0.5; transform:scale(1.15); }
}

.orb.listening {
  box-shadow: 0 0 40px rgba(0,245,160,0.5), 0 0 80px rgba(0,245,160,0.2);
  background: linear-gradient(135deg, var(--green), #00b4d8);
}
.orb.speaking {
  box-shadow: 0 0 40px rgba(194,100,254,0.7), 0 0 80px rgba(194,100,254,0.3);
  animation: orb-speak 0.6s ease-in-out infinite alternate;
}
@keyframes orb-speak {
  from { transform: scale(1); }
  to { transform: scale(1.06); }
}

.orb-info { flex: 1; }
.orb-name {
  font-size: 20px;
  font-weight: 800;
  letter-spacing: 0.05em;
  background: linear-gradient(90deg, var(--accent), var(--accent2));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  line-height: 1;
  margin-bottom: 4px;
}
.orb-sub {
  font-size: 11px;
  color: var(--fg2);
  font-family: 'JetBrains Mono', monospace;
  letter-spacing: 0.05em;
}
.status-dot {
  display: inline-block;
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--green);
  box-shadow: 0 0 8px var(--green);
  margin-right: 6px;
  vertical-align: middle;
  animation: pulse-dot 2s ease-in-out infinite;
}

/* ── Chat ── */
#chat {
  flex: 1;
  overflow-y: auto;
  padding: 12px 24px;
  scroll-behavior: smooth;
}

#chat::-webkit-scrollbar { width: 3px; }
#chat::-webkit-scrollbar-track { background: transparent; }
#chat::-webkit-scrollbar-thumb { background: var(--fg3); border-radius: 2px; }

.msg {
  display: flex;
  margin-bottom: 12px;
  gap: 10px;
  animation: msg-in 0.35s cubic-bezier(0.34,1.56,0.64,1) both;
}
@keyframes msg-in {
  from { opacity:0; transform: translateY(16px) scale(0.95); }
  to   { opacity:1; transform: translateY(0) scale(1); }
}

.msg.user { flex-direction: row-reverse; }

.msg-avatar {
  width: 28px; height: 28px;
  border-radius: 50%;
  flex-shrink: 0;
  display: flex; align-items:center; justify-content:center;
  font-size: 11px;
  font-weight: 700;
  margin-top: 2px;
}
.msg.bot .msg-avatar {
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  color: white;
}
.msg.user .msg-avatar {
  background: var(--surface);
  color: var(--fg2);
  border: 1px solid var(--border);
}

.msg-bubble {
  max-width: 78%;
  padding: 10px 14px;
  border-radius: 16px;
  font-size: 13.5px;
  line-height: 1.55;
  position: relative;
}
.msg.bot .msg-bubble {
  background: linear-gradient(135deg, rgba(15,17,34,0.95), rgba(21,23,42,0.95));
  border: 1px solid var(--border);
  border-bottom-left-radius: 4px;
  color: var(--fg);
  backdrop-filter: blur(12px);
}
.msg.bot .msg-bubble::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, var(--accent), transparent);
  border-radius: 16px 16px 0 0;
  opacity: 0.4;
}
.msg.user .msg-bubble {
  background: linear-gradient(135deg, rgba(194,100,254,0.15), rgba(0,212,255,0.1));
  border: 1px solid rgba(194,100,254,0.25);
  border-bottom-right-radius: 4px;
  color: var(--fg);
}

.msg-time {
  font-size: 10px;
  color: var(--fg2);
  font-family: 'JetBrains Mono', monospace;
  margin-top: 3px;
  opacity: 0.7;
}
.msg.user .msg-time { text-align: right; }

/* Typing indicator */
.typing-bubble {
  display: flex;
  gap: 4px;
  align-items: center;
  padding: 12px 16px;
}
.typing-bubble span {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--accent);
  animation: typing 1.2s ease-in-out infinite;
}
.typing-bubble span:nth-child(2) { animation-delay: 0.2s; }
.typing-bubble span:nth-child(3) { animation-delay: 0.4s; }
@keyframes typing {
  0%,60%,100% { transform: translateY(0); opacity:0.4; }
  30% { transform: translateY(-6px); opacity:1; }
}

/* ── Visualizer ── */
#vis-wrap {
  padding: 8px 24px;
  flex-shrink: 0;
}

#vis {
  width: 100%;
  height: 36px;
  display: flex;
  align-items: flex-end;
  gap: 2.5px;
  justify-content: center;
}
.vis-bar {
  flex: 1;
  max-width: 5px;
  border-radius: 3px 3px 1px 1px;
  background: linear-gradient(180deg, var(--accent2), var(--accent));
  opacity: 0.3;
  height: 3px;
  transition: height 0.1s ease;
}

/* ── Input ── */
#input-area {
  padding: 12px 24px 20px;
  flex-shrink: 0;
  background: linear-gradient(0deg, rgba(6,7,15,0.98) 60%, transparent);
}

.input-wrap {
  display: flex;
  align-items: center;
  gap: 10px;
  background: rgba(15,17,34,0.9);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 8px 8px 8px 16px;
  backdrop-filter: blur(20px);
  transition: border-color 0.3s, box-shadow 0.3s;
}
.input-wrap:focus-within {
  border-color: rgba(194,100,254,0.5);
  box-shadow: 0 0 20px rgba(194,100,254,0.1);
}

#text-input {
  flex: 1;
  background: none;
  border: none;
  outline: none;
  color: var(--fg);
  font-family: 'Syne', sans-serif;
  font-size: 13.5px;
  caret-color: var(--accent);
  min-width: 0;
}
#text-input::placeholder { color: var(--fg2); font-style: italic; }

.mic-btn {
  width: 38px; height: 38px;
  border-radius: 12px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  border: none;
  cursor: pointer;
  display: flex; align-items:center; justify-content:center;
  flex-shrink: 0;
  transition: transform 0.2s, box-shadow 0.2s;
  box-shadow: 0 0 15px rgba(194,100,254,0.3);
  font-size: 16px;
}
.mic-btn:hover { transform: scale(1.08); box-shadow: 0 0 25px rgba(194,100,254,0.5); }
.mic-btn:active { transform: scale(0.94); }
.mic-btn.active {
  background: linear-gradient(135deg, var(--green), #00b4d8);
  box-shadow: 0 0 25px rgba(0,245,160,0.5);
  animation: mic-pulse 1s ease-in-out infinite;
}
@keyframes mic-pulse {
  0%,100% { transform:scale(1); }
  50% { transform:scale(1.07); }
}

.send-btn {
  width: 38px; height: 38px;
  border-radius: 12px;
  background: var(--surface);
  border: 1px solid var(--border);
  cursor: pointer;
  display: flex; align-items:center; justify-content:center;
  flex-shrink: 0;
  transition: all 0.2s;
  color: var(--fg2);
  font-size: 15px;
}
.send-btn:hover { background: rgba(194,100,254,0.1); color: var(--accent); border-color: var(--accent); }

/* ── Neon bottom line ── */
.neon-line {
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--accent), var(--accent2), transparent);
  opacity: 0.4;
  margin: 0 24px;
  flex-shrink: 0;
}

/* ── Particles burst ── */
.particle {
  position: fixed;
  pointer-events: none;
  z-index: 999;
  border-radius: 50%;
  width: 6px; height: 6px;
  animation: particle-out 0.8s ease-out forwards;
}
@keyframes particle-out {
  0% { transform: translate(0,0) scale(1); opacity:1; }
  100% { transform: translate(var(--tx), var(--ty)) scale(0); opacity:0; }
}

/* ── Scrollbar hide for firefox ── */
#chat { scrollbar-width: thin; scrollbar-color: var(--fg3) transparent; }
</style>
</head>
<body>

<canvas id="canvas"></canvas>

<div id="app">
  <!-- Header -->
  <div id="header">
    <div class="title-bar">
      <div class="title-bar-left" id="drag-handle">
        <div class="logo-dot"></div>
        <span class="title-text">Scarlett AI</span>
      </div>
      <div class="title-actions">
        <button class="tbtn" id="btn-settings" title="Настройки">⚙</button>
        <button class="tbtn" id="btn-min"      title="В трей">–</button>
        <button class="tbtn close" id="btn-close" title="Закрыть">✕</button>
      </div>
    </div>

    <div class="scarlett-card">
      <div class="orb-wrap">
        <div class="orb" id="orb">S</div>
      </div>
      <div class="orb-info">
        <div class="orb-name">SCARLETT</div>
        <div class="orb-sub">
          <span class="status-dot" id="status-dot"></span>
          <span id="status-text">Слушаю...</span>
        </div>
      </div>
    </div>
  </div>

  <!-- Chat -->
  <div id="chat"></div>

  <!-- Visualizer -->
  <div id="vis-wrap">
    <div id="vis"></div>
  </div>

  <div class="neon-line"></div>

  <!-- Input -->
  <div id="input-area">
    <div class="input-wrap">
      <input id="text-input" type="text"
        placeholder="Команда или голос..." autocomplete="off" spellcheck="false">
      <button class="mic-btn" id="mic-btn" title="Голос">🎤</button>
      <button class="send-btn" id="send-btn" title="Отправить">↑</button>
    </div>
  </div>
</div>

<script>
// ══════════════════════════════════════════════════════════
// WebGL Background — пульсирующие частицы
// ══════════════════════════════════════════════════════════
const canvas = document.getElementById('canvas');
const gl = canvas.getContext('webgl');

function resize() {
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
  if(gl) gl.viewport(0,0,canvas.width,canvas.height);
}
resize();
window.addEventListener('resize', resize);

if (gl) {
  const VS = `
    attribute vec2 a_pos;
    attribute float a_size;
    attribute vec4 a_color;
    uniform vec2 u_res;
    uniform float u_time;
    varying vec4 v_color;
    void main(){
      vec2 pos = (a_pos / u_res) * 2.0 - 1.0;
      pos.y = -pos.y;
      float wave = sin(u_time * 0.8 + a_pos.x * 0.01) * 3.0;
      pos.y += wave / u_res.y * 2.0;
      gl_Position = vec4(pos, 0, 1);
      gl_PointSize = a_size;
      v_color = a_color;
    }`;
  const FS = `
    precision mediump float;
    varying vec4 v_color;
    void main(){
      float d = length(gl_PointCoord - 0.5) * 2.0;
      if(d > 1.0) discard;
      float alpha = (1.0 - d) * v_color.a;
      gl_FragColor = vec4(v_color.rgb, alpha);
    }`;

  function mkShader(type, src) {
    const s = gl.createShader(type);
    gl.shaderSource(s, src); gl.compileShader(s);
    return s;
  }
  const prog = gl.createProgram();
  gl.attachShader(prog, mkShader(gl.VERTEX_SHADER, VS));
  gl.attachShader(prog, mkShader(gl.FRAGMENT_SHADER, FS));
  gl.linkProgram(prog);
  gl.useProgram(prog);

  const N = 120;
  const particles = Array.from({length:N}, () => ({
    x: Math.random() * window.innerWidth,
    y: Math.random() * window.innerHeight,
    vx: (Math.random()-0.5) * 0.3,
    vy: (Math.random()-0.5) * 0.2,
    size: Math.random() * 3 + 1,
    r: Math.random() > 0.5 ? 0.76 : 0.0,
    g: Math.random() > 0.5 ? 0.39 : 0.83,
    b: Math.random() > 0.5 ? 0.99 : 1.0,
    a: Math.random() * 0.35 + 0.05,
    phase: Math.random() * Math.PI * 2,
  }));

  const posArr  = new Float32Array(N*2);
  const sizeArr = new Float32Array(N);
  const colArr  = new Float32Array(N*4);

  const aBuf = gl.createBuffer(), sBuf = gl.createBuffer(), cBuf = gl.createBuffer();
  const aPos   = gl.getAttribLocation(prog,'a_pos');
  const aSize  = gl.getAttribLocation(prog,'a_size');
  const aColor = gl.getAttribLocation(prog,'a_color');
  const uRes   = gl.getUniformLocation(prog,'u_res');
  const uTime  = gl.getUniformLocation(prog,'u_time');

  gl.enable(gl.BLEND);
  gl.blendFunc(gl.SRC_ALPHA, gl.ONE);

  let t = 0;
  let listening = false;

  function frame() {
    requestAnimationFrame(frame);
    t += 0.016;
    const W = canvas.width, H = canvas.height;
    gl.clearColor(0,0,0,0); gl.clear(gl.COLOR_BUFFER_BIT);
    gl.uniform2f(uRes, W, H);
    gl.uniform1f(uTime, t);

    particles.forEach((p,i) => {
      p.x += p.vx + Math.sin(t*0.5 + p.phase)*0.15;
      p.y += p.vy + Math.cos(t*0.4 + p.phase)*0.1;
      if(p.x<-10) p.x=W+10;
      if(p.x>W+10) p.x=-10;
      if(p.y<-10) p.y=H+10;
      if(p.y>H+10) p.y=-10;
      posArr[i*2]=p.x; posArr[i*2+1]=p.y;
      const glow = listening ? 1.5 : 1.0;
      sizeArr[i] = (p.size + Math.sin(t*1.5+p.phase)*0.8) * glow;
      const pulse = listening ? (0.5 + 0.5*Math.sin(t*3+p.phase)) : 1.0;
      colArr[i*4]=p.r; colArr[i*4+1]=p.g; colArr[i*4+2]=p.b;
      colArr[i*4+3]=p.a * pulse;
    });

    gl.bindBuffer(gl.ARRAY_BUFFER,aBuf);
    gl.bufferData(gl.ARRAY_BUFFER,posArr,gl.DYNAMIC_DRAW);
    gl.enableVertexAttribArray(aPos);
    gl.vertexAttribPointer(aPos,2,gl.FLOAT,false,0,0);

    gl.bindBuffer(gl.ARRAY_BUFFER,sBuf);
    gl.bufferData(gl.ARRAY_BUFFER,sizeArr,gl.DYNAMIC_DRAW);
    gl.enableVertexAttribArray(aSize);
    gl.vertexAttribPointer(aSize,1,gl.FLOAT,false,0,0);

    gl.bindBuffer(gl.ARRAY_BUFFER,cBuf);
    gl.bufferData(gl.ARRAY_BUFFER,colArr,gl.DYNAMIC_DRAW);
    gl.enableVertexAttribArray(aColor);
    gl.vertexAttribPointer(aColor,4,gl.FLOAT,false,0,0);

    gl.drawArrays(gl.POINTS,0,N);
  }
  frame();

  window._setListening = v => { listening = v; };
}

// ══════════════════════════════════════════════════════════
// Visualizer bars
// ══════════════════════════════════════════════════════════
const vis = document.getElementById('vis');
const BAR_N = 48;
const bars = [];
for(let i=0;i<BAR_N;i++){
  const b = document.createElement('div');
  b.className='vis-bar';
  vis.appendChild(b);
  bars.push(b);
}

let audioCtx, analyser, micStream, visAnim;
let visActive = false;

function startVis(stream) {
  audioCtx = new (window.AudioContext||window.webkitAudioContext)();
  const src = audioCtx.createMediaStreamSource(stream);
  analyser = audioCtx.createAnalyser();
  analyser.fftSize = 128;
  src.connect(analyser);
  const buf = new Uint8Array(analyser.frequencyBinCount);
  visActive = true;
  function draw(){
    if(!visActive) return;
    requestAnimationFrame(draw);
    analyser.getByteFrequencyData(buf);
    bars.forEach((b,i)=>{
      const idx = Math.floor(i * buf.length / BAR_N);
      const v = buf[idx] / 255;
      const h = Math.max(3, v * 32);
      b.style.height = h+'px';
      b.style.opacity = 0.3 + v*0.7;
    });
  }
  draw();
}

function stopVis() {
  visActive = false;
  bars.forEach(b=>{ b.style.height='3px'; b.style.opacity='0.3'; });
  if(audioCtx) { audioCtx.close(); audioCtx=null; }
}

// ══════════════════════════════════════════════════════════
// Chat
// ══════════════════════════════════════════════════════════
const chatEl = document.getElementById('chat');
const orb = document.getElementById('orb');
const statusText = document.getElementById('status-text');
const statusDot = document.getElementById('status-dot');

function addMsg(role, text) {
  const div = document.createElement('div');
  div.className = 'msg ' + role;
  const now = new Date();
  const time = now.getHours().toString().padStart(2,'0')+':'+now.getMinutes().toString().padStart(2,'0');
  div.innerHTML = `
    <div class="msg-avatar">${role==='bot'?'S':'Я'}</div>
    <div>
      <div class="msg-bubble">${text}</div>
      <div class="msg-time">${time}</div>
    </div>`;
  chatEl.appendChild(div);
  chatEl.scrollTop = chatEl.scrollHeight;
  // Particle burst on bot message
  if(role==='bot') spawnParticles(orb);
}

function showTyping() {
  removeTyping();
  const div = document.createElement('div');
  div.className = 'msg bot'; div.id='typing-msg';
  div.innerHTML = `<div class="msg-avatar">S</div>
    <div class="msg-bubble typing-bubble">
      <span></span><span></span><span></span>
    </div>`;
  chatEl.appendChild(div);
  chatEl.scrollTop = chatEl.scrollHeight;
}
function removeTyping() {
  const el = document.getElementById('typing-msg');
  if(el) el.remove();
}

function setStatus(s) {
  const map = {
    listening: { text:'Слушаю...', color:'var(--green)', cls:'listening' },
    thinking:  { text:'Думаю...', color:'var(--accent)', cls:'' },
    speaking:  { text:'Говорю...', color:'var(--accent2)', cls:'speaking' },
    idle:      { text:'Активна', color:'var(--green)', cls:'' },
  };
  const st = map[s] || map.idle;
  statusText.textContent = st.text;
  statusDot.style.background = st.color;
  statusDot.style.boxShadow = `0 0 8px ${st.color}`;
  orb.className = 'orb ' + st.cls;
  if(window._setListening) window._setListening(s==='listening');
}

// ══════════════════════════════════════════════════════════
// Particles burst
// ══════════════════════════════════════════════════════════
function spawnParticles(el) {
  const rect = el.getBoundingClientRect();
  const cx = rect.left + rect.width/2;
  const cy = rect.top  + rect.height/2;
  const colors = ['#C264FE','#00D4FF','#00F5A0','#FF2D55'];
  for(let i=0;i<12;i++){
    const p = document.createElement('div');
    p.className = 'particle';
    const angle = (Math.random()*360)*Math.PI/180;
    const dist  = 40 + Math.random()*60;
    p.style.cssText = `
      left:${cx}px; top:${cy}px;
      background:${colors[Math.floor(Math.random()*colors.length)]};
      --tx:${Math.cos(angle)*dist}px;
      --ty:${Math.sin(angle)*dist}px;
      animation-duration:${0.5+Math.random()*0.5}s;
    `;
    document.body.appendChild(p);
    p.addEventListener('animationend',()=>p.remove());
  }
}

// ══════════════════════════════════════════════════════════
// Mic & Web Speech API (для демо в браузере)
// ══════════════════════════════════════════════════════════
let recognition = null;
let micActive = false;
const micBtn = document.getElementById('mic-btn');

function startMic() {
  if(!('webkitSpeechRecognition' in window || 'SpeechRecognition' in window)) {
    addMsg('bot','Голосовой ввод недоступен в этом браузере. Используй текст.');
    return;
  }
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  recognition = new SR();
  recognition.lang = 'ru-RU';
  recognition.continuous = false;
  recognition.interimResults = false;
  recognition.onresult = e => {
    const text = e.results[0][0].transcript;
    stopMic();
    handleInput(text);
  };
  recognition.onerror = () => stopMic();
  recognition.onend   = () => { if(micActive) stopMic(); };
  recognition.start();
  micActive = true;
  micBtn.classList.add('active');
  micBtn.textContent = '⏹';
  setStatus('listening');

  navigator.mediaDevices.getUserMedia({audio:true}).then(stream=>{
    micStream = stream;
    startVis(stream);
  }).catch(()=>{});
}

function stopMic() {
  micActive = false;
  micBtn.classList.remove('active');
  micBtn.textContent = '🎤';
  if(recognition) { recognition.stop(); recognition=null; }
  if(micStream) { micStream.getTracks().forEach(t=>t.stop()); micStream=null; }
  stopVis();
  setStatus('idle');
}

micBtn.addEventListener('click', ()=>{
  if(micActive) stopMic(); else startMic();
});

// ══════════════════════════════════════════════════════════
// Input handling
// ══════════════════════════════════════════════════════════
const textInput = document.getElementById('text-input');
const sendBtn   = document.getElementById('send-btn');

async function handleInput(text) {
  if(!text.trim()) return;
  addMsg('user', text);
  textInput.value = '';
  setStatus('thinking');
  showTyping();

  // Симуляция ответа (в реальной версии — WebSocket к Python)
  await new Promise(r=>setTimeout(r, 800+Math.random()*600));
  removeTyping();
  const reply = getBotReply(text);
  addMsg('bot', reply);
  setStatus('speaking');
  speak(reply);
}

sendBtn.addEventListener('click', ()=> handleInput(textInput.value));
textInput.addEventListener('keydown', e=>{ if(e.key==='Enter') handleInput(textInput.value); });

// TTS
function speak(text) {
  if(!window.speechSynthesis) { setStatus('idle'); return; }
  const utt = new SpeechSynthesisUtterance(text);
  utt.lang = 'ru-RU';
  utt.rate = 1.05;
  const voices = speechSynthesis.getVoices().filter(v=>v.lang.startsWith('ru'));
  if(voices.length) utt.voice = voices[0];
  utt.onend = ()=> setStatus('idle');
  speechSynthesis.speak(utt);
}

// Demo replies
function getBotReply(t) {
  t = t.toLowerCase();
  if(t.includes('привет')||t.includes('хай')) return 'Привет! Чем могу помочь?';
  if(t.includes('как дела')||t.includes('как ты')) return 'Отлично, спасибо! Всегда в строю.';
  if(t.includes('время')||t.includes('сколько времени')) {
    const now=new Date(); return `Сейчас ${now.getHours()}:${now.getMinutes().toString().padStart(2,'0')}.`;
  }
  if(t.includes('погода')) return 'Для погоды нужен доступ к Python-бэкенду Скарлетт.';
  if(t.includes('открой')) return 'Команда открытия передана в систему.';
  return 'Понял. Это демо-режим — подключи Python-бэкенд для полного функционала.';
}

// Window controls (работает когда открыт через Python)
document.getElementById('btn-close').onclick   = ()=> window.close?.() || window.pywebview?.api?.quit?.();
document.getElementById('btn-min').onclick     = ()=> window.pywebview?.api?.sleep?.();
document.getElementById('btn-settings').onclick= ()=> window.pywebview?.api?.settings?.();

// ── Drag (для Electron/pywebview) ──
let drag={on:false,ox:0,oy:0};
document.getElementById('drag-handle').addEventListener('mousedown',e=>{
  drag={on:true,ox:e.screenX,oy:e.screenY};
});
document.addEventListener('mousemove',e=>{
  if(!drag.on) return;
  window.pywebview?.moveTo?.(e.screenX-drag.ox, e.screenY-drag.oy);
});
document.addEventListener('mouseup',()=>drag.on=false);

// ── Init ──
setStatus('listening');
addMsg('bot','Привет! Я Скарлетт — твой голосовой ИИ-помощник. Скажи что-нибудь или напиши команду.');
</script>
